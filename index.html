<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LUT 33³">
<meta name="theme-color" content="#0a0a0b">
<title>CUBE → 33³</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root {
    --bg: #0a0a0b;
    --bg-elev: #131316;
    --bg-card: #18181c;
    --line: #26262c;
    --line-bright: #3a3a44;
    --text: #e8e8ea;
    --text-dim: #8a8a93;
    --text-faint: #5a5a63;
    --accent: #d4ff3a;
    --accent-dim: #8fa823;
    --danger: #ff5a5a;
    --warn: #ffaa3a;
    --ok: #6affb0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 13px;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -webkit-text-size-adjust: 100%;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    background-image:
      radial-gradient(circle at 20% 15%, rgba(212, 255, 58, 0.05) 0%, transparent 45%),
      radial-gradient(circle at 80% 85%, rgba(106, 255, 176, 0.03) 0%, transparent 45%);
    background-attachment: fixed;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 60px 60px;
    opacity: 0.1;
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    flex: 1;
    width: 100%;
    max-width: 540px;
    margin: 0 auto;
    /* Extra bottom padding so Safari's bottom bar doesn't overlap the footer */
    padding: 32px 20px max(80px, env(safe-area-inset-bottom));
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
  }

  header {
    text-align: center;
    margin-bottom: 36px;
  }

  .eyebrow {
    color: var(--text-faint);
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .eyebrow .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    50% { box-shadow: 0 0 18px var(--accent); }
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: clamp(40px, 11vw, 56px);
    line-height: 0.95;
    letter-spacing: -0.025em;
    margin-bottom: 12px;
  }

  h1 em {
    font-style: italic;
    font-weight: 500;
    color: var(--accent);
  }

  header .sub {
    color: var(--text-dim);
    font-size: 12px;
    max-width: none;
    margin: 0 auto;
    white-space: nowrap;
  }

  .pick-btn {
    display: block;
    width: 100%;
    padding: 32px 24px;
    background: var(--bg-card);
    border: 1px dashed var(--line-bright);
    border-radius: 6px;
    cursor: pointer;
    text-align: center;
    transition: all 200ms cubic-bezier(.2,.9,.3,1);
    position: relative;
    overflow: hidden;
    -webkit-appearance: none;
    appearance: none;
    color: var(--text);
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }

  .pick-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(212, 255, 58, 0.08) 0%, transparent 65%);
    opacity: 0;
    transition: opacity 240ms;
    pointer-events: none;
  }

  .pick-btn:hover, .pick-btn:focus-visible {
    border-color: var(--accent);
    background: rgba(212, 255, 58, 0.03);
  }
  .pick-btn:hover::before, .pick-btn:focus-visible::before { opacity: 1; }
  .pick-btn:active {
    transform: scale(0.99);
  }
  .pick-btn:focus-visible { outline: none; }

  .pick-btn.drag {
    border-style: solid;
    border-color: var(--accent);
    background: rgba(212, 255, 58, 0.05);
  }

  .pick-btn-icon {
    font-family: 'Fraunces', serif;
    font-size: 60px;
    line-height: 1;
    color: var(--accent);
    margin-bottom: 18px;
    font-weight: 300;
    font-style: italic;
    display: block;
  }

  .pick-btn-main {
    font-size: 16px;
    color: var(--text);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .pick-btn-sub {
    color: var(--text-faint);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .dest {
    margin-top: 18px;
    padding: 14px 16px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 11px;
  }
  .dest-icon {
    color: var(--accent);
    font-family: 'Fraunces', serif;
    font-size: 16px;
    line-height: 1;
    width: 16px;
    text-align: center;
    font-style: italic;
  }
  .dest-label {
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-size: 10px;
  }
  .dest-value {
    color: var(--text);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .dest-change {
    color: var(--accent);
    background: none;
    border: none;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 4px 8px;
    margin: -4px -8px;
    -webkit-tap-highlight-color: transparent;
  }
  .dest-change:hover { text-decoration: underline; text-underline-offset: 3px; }

  .cube-option-row {
    margin-top: 8px;
    padding: 12px 14px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 11px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: border-color 150ms;
  }
  .cube-option-row:hover { border-color: var(--line-bright); }
  .cube-option-row.is-hidden { display: none; }
  .cube-option-row input {
    width: 18px;
    height: 18px;
    margin: 0;
    accent-color: var(--accent);
    flex-shrink: 0;
  }
  .cube-option-copy {
    min-width: 0;
  }
  .cube-option-copy strong {
    display: block;
    color: var(--text);
    font-size: 12px;
    font-weight: 500;
  }
  .cube-option-copy span {
    display: block;
    color: var(--text-faint);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .mode-row {
    margin-top: 8px;
    padding: 6px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 4px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .mode-option {
    position: relative;
    min-width: 0;
  }
  .mode-option input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }
  .mode-option span {
    display: block;
    padding: 10px 12px;
    border: 1px solid transparent;
    border-radius: 3px;
    color: var(--text-dim);
    text-align: center;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transition: all 160ms;
  }
  .mode-option input:checked + span {
    background: rgba(212, 255, 58, 0.08);
    border-color: var(--accent-dim);
    color: var(--accent);
  }

  .xmp-profile-panel {
    margin-top: 8px;
    padding: 14px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 4px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }
  .xmp-profile-panel.is-hidden { display: none; }
  .xmp-profile-panel label {
    display: grid;
    gap: 6px;
  }
  .xmp-profile-panel span {
    color: var(--text-faint);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .xmp-profile-panel select,
  .xmp-profile-panel input {
    width: 100%;
    min-height: 38px;
    padding: 8px 10px;
    border: 1px solid var(--line-bright);
    border-radius: 3px;
    background: var(--bg-card);
    color: var(--text);
    font: inherit;
    font-size: 11px;
  }

  .convert-btn {
    width: 100%;
    margin-top: 8px;
    min-height: 48px;
    border: 1px solid var(--accent-dim);
    border-radius: 4px;
    background: var(--accent);
    color: var(--bg);
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 160ms, transform 160ms;
  }
  .convert-btn:active { transform: scale(0.99); }
  .convert-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .status-area {
    margin-top: 28px;
    min-height: 0;
  }

  .progress-row {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-left: 2px solid var(--line-bright);
    padding: 14px 16px;
    margin-bottom: 8px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    transition: border-left-color 200ms, background 200ms;
  }
  .progress-row.processing {
    border-left-color: var(--warn);
    background: rgba(255, 170, 58, 0.04);
  }
  .progress-row.done {
    border-left-color: var(--ok);
  }
  .progress-row.error {
    border-left-color: var(--danger);
    background: rgba(255, 90, 90, 0.04);
  }

  .progress-row .pname {
    flex: 1;
    overflow: hidden;
    min-width: 0;
  }
  .progress-row .pname strong {
    color: var(--text);
    font-weight: 500;
    display: block;
    margin-bottom: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .progress-row .pname .pmeta {
    color: var(--text-faint);
    font-size: 10px;
    letter-spacing: 0.05em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .progress-row .pname .pmeta.err {
    color: var(--danger);
  }

  .progress-row .pstatus {
    font-size: 9px;
    padding: 4px 8px;
    border: 1px solid;
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .progress-row.pending .pstatus { color: var(--text-faint); border-color: var(--line-bright); }
  .progress-row.processing .pstatus {
    color: var(--warn); border-color: var(--warn);
    animation: pulse 1.4s ease-in-out infinite;
  }
  .progress-row.done .pstatus { color: var(--ok); border-color: var(--ok); }
  .progress-row.error .pstatus { color: var(--danger); border-color: var(--danger); }

  @keyframes pulse { 50% { opacity: 0.4; } }

  .progress-row .dl-link {
    background: var(--accent);
    color: var(--bg);
    border: 1px solid var(--accent);
    padding: 8px 14px;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 3px;
    font-weight: 600;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .progress-row .dl-link:active { transform: scale(0.96); }

  .summary {
    margin-top: 18px;
    padding: 14px 16px;
    border: 1px solid var(--accent-dim);
    background: rgba(212, 255, 58, 0.06);
    border-radius: 4px;
    color: var(--text);
    font-size: 12px;
    display: none;
    text-align: center;
  }
  .summary.show { display: block; }
  .summary strong { color: var(--accent); }

  .ios-note {
    margin-top: 14px;
    padding: 12px 14px;
    border: 1px solid var(--line);
    background: var(--bg-card);
    border-radius: 4px;
    font-size: 10px;
    line-height: 1.6;
    color: var(--text-dim);
    display: none;
  }
  .ios-note.show { display: block; }
  .ios-note .lbl {
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-size: 9px;
    display: block;
    margin-bottom: 4px;
  }

  footer {
    margin-top: auto;
    padding-top: 32px;
    text-align: center;
    color: var(--text-faint);
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    line-height: 2;
  }

  .toast {
    position: fixed;
    bottom: max(24px, env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(120%);
    background: var(--bg-card);
    border: 1px solid var(--line-bright);
    color: var(--text);
    padding: 12px 18px;
    border-radius: 4px;
    font-size: 12px;
    transition: transform 280ms cubic-bezier(.2,.9,.3,1);
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    max-width: calc(100vw - 32px);
    text-align: center;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { border-color: var(--danger); color: var(--danger); }
  .toast.success { border-color: var(--accent); color: var(--accent); }

  @media (max-width: 380px) {
    h1 { font-size: 36px; }
    .pick-btn { padding: 28px 20px; }
    .pick-btn-icon { font-size: 50px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow"><span class="dot"></span> CUBE · LUT · RESAMPLER</div>
    <h1 id="heroTitle">→ <em>33³</em></h1>
    <p class="sub" id="heroSub">选文件，转换到 33×33×33，点 ↓ 保存。</p>
  </header>

  <button class="pick-btn" id="pickBtn" type="button">
    <span class="pick-btn-icon">+</span>
    <div class="pick-btn-main">选择 .cube 文件</div>
    <div class="pick-btn-sub">tap to select · multi-file ok</div>
  </button>
  <input type="file" id="fileInput" multiple accept=".cube,application/octet-stream,text/plain" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;" />

  <div class="mode-row" aria-label="输出格式">
    <label class="mode-option">
      <input type="checkbox" id="cubeOutputToggle" checked />
      <span>33³ CUBE</span>
    </label>
    <label class="mode-option">
      <input type="checkbox" id="xmpOutputToggle" />
      <span>Adobe XMP</span>
    </label>
  </div>

  <label class="cube-option-row" id="cubeMetaOption" for="ladyMetaToggle">
    <input type="checkbox" id="ladyMetaToggle" />
    <span class="cube-option-copy">
      <strong>写入 STD 标记</strong>
      <span>LUMIX Photo Style header</span>
    </span>
  </label>

  <label class="cube-option-row" id="copyrightOption" for="copyrightToggle">
    <input type="checkbox" id="copyrightToggle" />
    <span class="cube-option-copy">
      <strong>写入 Plady Copyright</strong>
      <span>#Copyright: (C) Copyright YYYY Plady</span>
    </span>
  </label>

  <label class="cube-option-row" for="timestampToggle">
    <input type="checkbox" id="timestampToggle" />
    <span class="cube-option-copy">
      <strong>添加时间后缀</strong>
      <span>在输出文件名后添加 _MMDDHHmm</span>
    </span>
  </label>

  <div class="xmp-profile-panel is-hidden" id="xmpProfilePanel">
    <label>
      <span>厂商</span>
      <select id="xmpMakerSelect"></select>
    </label>
    <label>
      <span>机型</span>
      <select id="xmpModelSelect"></select>
    </label>
    <label class="is-hidden" id="xmpCustomModelField">
      <span>自定义机型名称</span>
      <input id="xmpCustomModelInput" type="text" placeholder="例如 DC-S5M2" />
    </label>
    <label>
      <span>基础 Profile</span>
      <select id="xmpProfileSelect">
        <option value="">不写入</option>
        <option value="Adobe Color">Adobe Color</option>
        <option value="Adobe Standard">Adobe Standard</option>
        <option value="Camera Standard">Camera Standard</option>
        <option value="Camera Neutral">Camera Neutral</option>
        <option value="Camera Vivid">Camera Vivid</option>
        <option value="Camera Portrait">Camera Portrait</option>
        <option value="Camera Landscape">Camera Landscape</option>
        <option value="Camera Natural">Camera Natural</option>
        <option value="Camera Faithful">Camera Faithful</option>
        <option value="custom">自定义...</option>
      </select>
    </label>
    <label class="is-hidden" id="xmpCustomProfileField">
      <span>自定义 Profile 名称</span>
      <input id="xmpCustomProfileInput" type="text" placeholder="例如 Camera Standard" />
    </label>
  </div>

  <button class="convert-btn" id="convertButton" type="button" disabled>转换</button>

  <div class="status-area" id="statusArea"></div>

  <div class="summary" id="summary"></div>

  <div class="ios-note" id="iosNote">
    <span class="lbl">iOS Tip</span>
    若文件在 Safari 内打开预览（而非下载），<strong style="color:var(--text)">长按下方下载按钮</strong> → 选「下载链接的文件」即可保存到「文件」App。
  </div>

  <footer>
    <div>33³ · catmull-rom cubic · clamped · local-only</div>
    <div id="footerStats">v1.3 · ready</div>
  </footer>
</div>

<div class="toast" id="toast"></div>

<script>
/* Fixed recommended settings — no UI exposure */
const CONFIG = {
  targetSize: 33,
  precision: 6,
  clamp: true
};

const XMP_CONFIG = {
  targetSize: 32,
  amount: 100,
  rangeMin: 0,
  rangeMax: 200,
  primaries: 'sRGB',
  gamut: 'clip',
  toneMapStrength: 'high',
  group: 'Plady 预设'
};

const XMP_ENCODE_TABLE = "0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ.-:+=^!/*?`'|()[]{}@%$#";
const XMP_PRIMARY_MAP = {
  sRGB: { colors: 0, gamma: 1 },
  Adobe: { colors: 1, gamma: 3 },
  ProPhoto: { colors: 2, gamma: 2 },
  P3: { colors: 3, gamma: 1 },
  Rec2020: { colors: 4, gamma: 4 }
};

const CAMERA_LIBRARY = [
  { make: 'Panasonic', models: ['DC-S5M2', 'DC-S5M2X', 'DC-S5', 'DC-S1', 'DC-S1R', 'DC-S1H', 'DC-GH7', 'DC-GH6', 'DC-GH5M2', 'DC-G9M2', 'DC-G9'] },
  { make: 'Sony', models: ['ILCE-1', 'ILCE-1M2', 'ILCE-7M4', 'ILCE-7RM5', 'ILCE-7SM3', 'ILCE-7CR', 'ILCE-7CM2', 'ILCE-9M3', 'ILCE-6700', 'ZV-E1'] },
  { make: 'Canon', models: ['Canon EOS R5', 'Canon EOS R5 Mark II', 'Canon EOS R6', 'Canon EOS R6 Mark II', 'Canon EOS R3', 'Canon EOS R7', 'Canon EOS R8', 'Canon EOS R10', 'Canon EOS R50'] },
  { make: 'Nikon', models: ['NIKON Z 9', 'NIKON Z 8', 'NIKON Z 7II', 'NIKON Z 6II', 'NIKON Z 6III', 'NIKON Z f', 'NIKON Z fc', 'NIKON Z 5', 'NIKON Z 50'] },
  { make: 'Fujifilm', models: ['GFX100 II', 'GFX100S', 'GFX50S II', 'X-H2S', 'X-H2', 'X-T5', 'X-T4', 'X-S20', 'X100VI', 'X100V'] },
  { make: 'Leica', models: ['LEICA SL3', 'LEICA SL2', 'LEICA SL2-S', 'LEICA Q3', 'LEICA Q2', 'LEICA M11', 'LEICA M10-R'] },
  { make: 'OM System', models: ['OM-1', 'OM-1 Mark II', 'OM-5', 'E-M1MarkIII', 'E-M1X', 'E-M5MarkIII'] },
  { make: 'Sigma', models: ['SIGMA fp', 'SIGMA fp L', 'SIGMA sd Quattro H'] },
  { make: 'Hasselblad', models: ['Hasselblad X2D 100C', 'Hasselblad X1D II 50C', 'Hasselblad CFV 100C'] },
  { make: 'Ricoh / Pentax', models: ['RICOH GR III', 'RICOH GR IIIx', 'PENTAX K-1 Mark II', 'PENTAX K-3 Mark III'] },
  { make: 'DJI', models: ['FC8284', 'FC3582', 'FC3411', 'FC7303', 'DJI Mavic 3 Pro', 'DJI Air 3'] },
  { make: 'Apple', models: ['iPhone 15 Pro', 'iPhone 15 Pro Max', 'iPhone 16 Pro', 'iPhone 16 Pro Max'] }
];

/* Suffix = "_MMDDHHmm" using local time, e.g. _05051324 */
function makeSuffix() {
  const d = new Date();
  const pad = (n) => String(n).padStart(2, '0');
  return `_${pad(d.getMonth() + 1)}${pad(d.getDate())}${pad(d.getHours())}${pad(d.getMinutes())}`;
}

/* ============ CUBE PARSER ============ */
function parseCube(text) {
  const lines = text.split(/\r?\n/);
  let size = null, title = '';
  let domainMin = [0, 0, 0];
  let domainMax = [1, 1, 1];
  let type = '3D';
  const data = [];

  for (let raw of lines) {
    const line = raw.trim();
    if (!line || line.startsWith('#')) continue;
    const upper = line.toUpperCase();
    if (upper.startsWith('TITLE')) { const m = line.match(/"([^"]*)"/); title = m ? m[1] : ''; continue; }
    if (upper.startsWith('LUT_3D_SIZE')) { size = parseInt(line.split(/\s+/)[1], 10); type = '3D'; continue; }
    if (upper.startsWith('LUT_1D_SIZE')) { size = parseInt(line.split(/\s+/)[1], 10); type = '1D'; continue; }
    if (upper.startsWith('DOMAIN_MIN')) { const p = line.split(/\s+/).slice(1).map(parseFloat); domainMin = [p[0],p[1],p[2]]; continue; }
    if (upper.startsWith('DOMAIN_MAX')) { const p = line.split(/\s+/).slice(1).map(parseFloat); domainMax = [p[0],p[1],p[2]]; continue; }
    const parts = line.split(/\s+/);
    if (parts.length >= 3) {
      const r = parseFloat(parts[0]);
      const g = parseFloat(parts[1]);
      const b = parseFloat(parts[2]);
      if (!isNaN(r) && !isNaN(g) && !isNaN(b)) data.push(r, g, b);
    }
  }
  if (type === '1D') throw new Error('1D LUT not supported');
  if (!size) throw new Error('LUT_3D_SIZE not found');
  if (data.length !== size * size * size * 3) {
    throw new Error(`Data count mismatch: expected ${size**3 * 3}, got ${data.length}`);
  }
  return { size, title, domainMin, domainMax, data: new Float32Array(data) };
}

/* ============ INDEXING ============ */
function getLUTSample(lut, r, g, b) {
  const s = lut.size;
  r = Math.max(0, Math.min(s-1, r));
  g = Math.max(0, Math.min(s-1, g));
  b = Math.max(0, Math.min(s-1, b));
  const idx = ((b*s + g)*s + r) * 3;
  return [lut.data[idx], lut.data[idx+1], lut.data[idx+2]];
}

/* ============ TRICUBIC (Catmull-Rom) ============ */
function catmullRom(p0, p1, p2, p3, t) {
  const t2 = t*t, t3 = t2*t;
  return 0.5 * ((2*p1) + (-p0 + p2)*t + (2*p0 - 5*p1 + 4*p2 - p3)*t2 + (-p0 + 3*p1 - 3*p2 + p3)*t3);
}
function sampleCubic(lut, fr, fg, fb) {
  const s = lut.size;
  const x = fr*(s-1), y = fg*(s-1), z = fb*(s-1);
  const ix = Math.floor(x), iy = Math.floor(y), iz = Math.floor(z);
  const tx = x-ix, ty = y-iy, tz = z-iz;
  const out = [0,0,0];
  for (let ch = 0; ch < 3; ch++) {
    const layer = new Array(4);
    for (let dz = -1; dz <= 2; dz++) {
      const zi = iz + dz;
      const row = new Array(4);
      for (let dy = -1; dy <= 2; dy++) {
        const yi = iy + dy;
        const col = new Array(4);
        for (let dx = -1; dx <= 2; dx++) col[dx+1] = getLUTSample(lut, ix+dx, yi, zi)[ch];
        row[dy+1] = catmullRom(col[0], col[1], col[2], col[3], tx);
      }
      layer[dz+1] = catmullRom(row[0], row[1], row[2], row[3], ty);
    }
    out[ch] = catmullRom(layer[0], layer[1], layer[2], layer[3], tz);
  }
  return out;
}

/* ============ RESAMPLE ============ */
function resampleLUT(lut, targetSize) {
  const out = new Float32Array(targetSize**3 * 3);
  const denom = targetSize - 1;
  for (let b = 0; b < targetSize; b++) {
    const fb = b / denom;
    for (let g = 0; g < targetSize; g++) {
      const fg = g / denom;
      for (let r = 0; r < targetSize; r++) {
        const fr = r / denom;
        const c = sampleCubic(lut, fr, fg, fb);
        const idx = ((b*targetSize + g)*targetSize + r) * 3;
        out[idx] = c[0]; out[idx+1] = c[1]; out[idx+2] = c[2];
      }
    }
  }
  return { size: targetSize, title: lut.title, domainMin: lut.domainMin, domainMax: lut.domainMax, data: out };
}

/* ============ SERIALIZE (strict) ============ */
function serializeCube(lut, sourceFilename, precision, clamp, stdHeader, copyright) {
  const lines = [];
  let title = lut.title || sourceFilename.replace(/\.cube$/i, '');
  const cleanTitle = String(title).replace(/"/g, '');
  const dmin = lut.domainMin || [0,0,0];
  const dmax = lut.domainMax || [1,1,1];

  if (stdHeader) {
    const year = new Date().getFullYear();
    if (copyright) lines.push(`#Copyright: (C) Copyright ${year} Plady`);
    lines.push(`TITLE "${cleanTitle}"`);
    lines.push(`#LUMIXPHOTOSTYLE STD`);
    lines.push(`#LUT size`);
    lines.push(`LUT_3D_SIZE ${lut.size}`);
    lines.push(`#data domain`);
    // Reference uses 0.0 / 1.0 (one-decimal). Match that for default domain.
    const isDefault = dmin[0]===0 && dmin[1]===0 && dmin[2]===0 &&
                      dmax[0]===1 && dmax[1]===1 && dmax[2]===1;
    if (isDefault) {
      lines.push(`DOMAIN_MIN 0.0 0.0 0.0`);
      lines.push(`DOMAIN_MAX 1.0 1.0 1.0`);
    } else {
      lines.push(`DOMAIN_MIN ${dmin.map(v => v.toFixed(precision)).join(' ')}`);
      lines.push(`DOMAIN_MAX ${dmax.map(v => v.toFixed(precision)).join(' ')}`);
    }
    lines.push(`#LUT data points`);
  } else {
    if (cleanTitle) lines.push(`TITLE "${cleanTitle}"`);
    lines.push(`# Resampled to ${lut.size}^3 by CUBE LUT Resampler`);
    lines.push(`LUT_3D_SIZE ${lut.size}`);
    lines.push(`DOMAIN_MIN ${dmin.map(v => v.toFixed(precision)).join(' ')}`);
    lines.push(`DOMAIN_MAX ${dmax.map(v => v.toFixed(precision)).join(' ')}`);
    lines.push('');
  }

  const n = lut.size ** 3;
  const out = new Array(n);
  for (let i = 0; i < n; i++) {
    let r = lut.data[i*3], g = lut.data[i*3+1], b = lut.data[i*3+2];
    if (clamp) {
      if (r < dmin[0]) r = dmin[0]; else if (r > dmax[0]) r = dmax[0];
      if (g < dmin[1]) g = dmin[1]; else if (g > dmax[1]) g = dmax[1];
      if (b < dmin[2]) b = dmin[2]; else if (b > dmax[2]) b = dmax[2];
    }
    if (r === 0) r = 0; if (g === 0) g = 0; if (b === 0) b = 0;
    out[i] = `${r.toFixed(precision)} ${g.toFixed(precision)} ${b.toFixed(precision)}`;
  }
  // STD header has no trailing blank before data; non-STD does (already appended above)
  return lines.join('\n') + '\n' + out.join('\n') + '\n';
}

/* ============ XMP LOOK EXPORT ============ */
function xmpIndex(size, r, g, b) {
  return (r * size * size + g * size + b) * 3;
}

function cubeToXmpOrder(lut) {
  const out = new Float64Array(lut.size ** 3 * 3);
  for (let b = 0; b < lut.size; b++) {
    for (let g = 0; g < lut.size; g++) {
      for (let r = 0; r < lut.size; r++) {
        const src = ((b * lut.size + g) * lut.size + r) * 3;
        const dst = xmpIndex(lut.size, r, g, b);
        out[dst] = lut.data[src];
        out[dst + 1] = lut.data[src + 1];
        out[dst + 2] = lut.data[src + 2];
      }
    }
  }
  return { ...lut, data: out };
}

function getXmpSample(lut, r, g, b) {
  const s = lut.size;
  r = Math.max(0, Math.min(s - 1, r));
  g = Math.max(0, Math.min(s - 1, g));
  b = Math.max(0, Math.min(s - 1, b));
  const idx = xmpIndex(s, r, g, b);
  return [lut.data[idx], lut.data[idx + 1], lut.data[idx + 2]];
}

function sampleTetrahedral(lut, rf, gf, bf) {
  const lr = Math.max(0, Math.min(lut.size - 1, Math.floor(rf)));
  const lg = Math.max(0, Math.min(lut.size - 1, Math.floor(gf)));
  const lb = Math.max(0, Math.min(lut.size - 1, Math.floor(bf)));
  const ur = Math.max(0, Math.min(lut.size - 1, lr + 1));
  const ug = Math.max(0, Math.min(lut.size - 1, lg + 1));
  const ub = Math.max(0, Math.min(lut.size - 1, lb + 1));
  const fr = rf - lr;
  const fg = gf - lg;
  const fb = bf - lb;

  const c000 = getXmpSample(lut, lr, lg, lb);
  const c100 = getXmpSample(lut, ur, lg, lb);
  const c010 = getXmpSample(lut, lr, ug, lb);
  const c001 = getXmpSample(lut, lr, lg, ub);
  const c110 = getXmpSample(lut, ur, ug, lb);
  const c101 = getXmpSample(lut, ur, lg, ub);
  const c011 = getXmpSample(lut, lr, ug, ub);
  const c111 = getXmpSample(lut, ur, ug, ub);
  const out = [0, 0, 0];

  for (let ch = 0; ch < 3; ch++) {
    if (fg >= fb && fb >= fr) {
      out[ch] = (1 - fg) * c000[ch] + (fg - fb) * c010[ch] + (fb - fr) * c011[ch] + fr * c111[ch];
    } else if (fb > fr && fr > fg) {
      out[ch] = (1 - fb) * c000[ch] + (fb - fr) * c001[ch] + (fr - fg) * c101[ch] + fg * c111[ch];
    } else if (fb > fg && fg >= fr) {
      out[ch] = (1 - fb) * c000[ch] + (fb - fg) * c001[ch] + (fg - fr) * c011[ch] + fr * c111[ch];
    } else if (fr >= fg && fg > fb) {
      out[ch] = (1 - fr) * c000[ch] + (fr - fg) * c100[ch] + (fg - fb) * c110[ch] + fb * c111[ch];
    } else if (fg > fr && fr >= fb) {
      out[ch] = (1 - fg) * c000[ch] + (fg - fr) * c010[ch] + (fr - fb) * c110[ch] + fb * c111[ch];
    } else {
      out[ch] = (1 - fr) * c000[ch] + (fr - fb) * c100[ch] + (fb - fg) * c101[ch] + fg * c111[ch];
    }
  }

  return out;
}

function resampleForXmp(lut, targetSize) {
  const dmin = lut.domainMin || [0, 0, 0];
  const dmax = lut.domainMax || [1, 1, 1];
  const isDefaultDomain = dmin[0] === 0 && dmin[1] === 0 && dmin[2] === 0 &&
    dmax[0] === 1 && dmax[1] === 1 && dmax[2] === 1;

  if (lut.size === targetSize && isDefaultDomain) {
    return lut.data;
  }

  const out = new Float64Array(targetSize ** 3 * 3);
  const mapDomain = (v, ch) => {
    const min = Number(dmin[ch]);
    const max = Number(dmax[ch]);
    if (!Number.isFinite(min) || !Number.isFinite(max) || max === min) return v;
    return Math.min(1, Math.max(0, (v - min) / (max - min)));
  };

  for (let r = 0; r < targetSize; r++) {
    for (let g = 0; g < targetSize; g++) {
      for (let b = 0; b < targetSize; b++) {
        const rf = mapDomain(r / (targetSize - 1), 0) * (lut.size - 1);
        const gf = mapDomain(g / (targetSize - 1), 1) * (lut.size - 1);
        const bf = mapDomain(b / (targetSize - 1), 2) * (lut.size - 1);
        const sample = sampleTetrahedral(lut, rf, gf, bf);
        const idx = xmpIndex(targetSize, r, g, b);
        out[idx] = sample[0];
        out[idx + 1] = sample[1];
        out[idx + 2] = sample[2];
      }
    }
  }
  return out;
}

function roundToUint16(value) {
  return Math.round(Math.min(1, Math.max(0, value)) * 65535);
}

function buildXmpPayload(lutData, size, options) {
  const payload = new ArrayBuffer(16 + size ** 3 * 3 * 2 + 28);
  const view = new DataView(payload);
  view.setUint32(0, 1, true);
  view.setUint32(4, 1, true);
  view.setUint32(8, 3, true);
  view.setUint32(12, size, true);

  const identity = new Uint16Array(size);
  for (let i = 0; i < size; i++) {
    identity[i] = Math.floor((i * 65535 + Math.floor(size / 2)) / (size - 1));
  }

  let offset = 16;
  for (let r = 0; r < size; r++) {
    for (let g = 0; g < size; g++) {
      for (let b = 0; b < size; b++) {
        const src = xmpIndex(size, r, g, b);
        view.setUint16(offset, (roundToUint16(lutData[src]) - identity[r]) & 0xffff, true);
        view.setUint16(offset + 2, (roundToUint16(lutData[src + 1]) - identity[g]) & 0xffff, true);
        view.setUint16(offset + 4, (roundToUint16(lutData[src + 2]) - identity[b]) & 0xffff, true);
        offset += 6;
      }
    }
  }

  const primary = XMP_PRIMARY_MAP[options.primaries] || XMP_PRIMARY_MAP.sRGB;
  view.setUint32(offset, primary.colors, true);
  view.setUint32(offset + 4, primary.gamma, true);
  view.setUint32(offset + 8, options.gamut === 'extend' ? 1 : 0, true);
  view.setFloat64(offset + 12, options.rangeMin / 100, true);
  view.setFloat64(offset + 20, options.rangeMax / 100, true);
  return new Uint8Array(payload);
}

function encodeBase85(bytes) {
  const paddedLength = Math.ceil(bytes.length / 4) * 4;
  const padded = new Uint8Array(paddedLength);
  padded.set(bytes);
  let out = '';
  let remaining = bytes.length;

  for (let offset = 0; offset < paddedLength && remaining > 0; offset += 4) {
    let value = padded[offset] |
      (padded[offset + 1] << 8) |
      (padded[offset + 2] << 16) |
      (padded[offset + 3] << 24);
    value >>>= 0;
    for (let step = 0; step < 5; step++) {
      out += XMP_ENCODE_TABLE[value % 85];
      value = Math.floor(value / 85);
      if (step > 0) {
        remaining--;
        if (remaining === 0) break;
      }
    }
  }

  return out;
}

function md5cycle(state, block) {

  a = ii(a, b, c, d, block[12], 6, 1700485571); d = ii(d, a, b, c, block[3], 10, -1894986606);
  c = ii(c, d, a, b, block[10], 15, -1051523); b = ii(b, c, d, a, block[1], 21, -2054922799);
  a = ii(a, b, c, d, block[8], 6, 1873313359); d = ii(d, a, b, c, block[15], 10, -30611744);
  c = ii(c, d, a, b, block[6], 15, -1560198380); b = ii(b, c, d, a, block[13], 21, 1309151649);
  a = ii(a, b, c, d, block[4], 6, -145523070); d = ii(d, a, b, c, block[11], 10, -1120210379);
  c = ii(c, d, a, b, block[2], 15, 718787259); b = ii(b, c, d, a, block[9], 21, -343485551);

  state[0] = add32(a, state[0]);
  state[1] = add32(b, state[1]);

function cmn(q, a, b, x, s, t) {
  a = add32(add32(a, q), add32(x, t));
  return add32((a << s) | (a >>> (32 - s)), b);
}

function add32(a, b) {
  return (a + b) & 0xffffffff;
}

function md5(bytes) {
  const state = [1732584193, -271733879, -1732584194, 271733878];
  const block = new Uint32Array(16);
  let index;
  for (index = 64; index <= bytes.length; index += 64) {
    for (let i = 0; i < 16; i++) {
      const offset = index - 64 + i * 4;
      block[i] = bytes[offset] | (bytes[offset + 1] << 8) | (bytes[offset + 2] << 16) | (bytes[offset + 3] << 24);
    }
    md5cycle(state, block);
  }

  const tail = new Uint8Array(64);
  tail.set(bytes.subarray(index - 64));
  tail[bytes.length % 64] = 0x80;
  if (bytes.length % 64 > 55) {
    for (let i = 0; i < 16; i++) block[i] = tail[i * 4] | (tail[i * 4 + 1] << 8) | (tail[i * 4 + 2] << 16) | (tail[i * 4 + 3] << 24);
    md5cycle(state, block);
    tail.fill(0);
  }

  const bitLength = bytes.length * 8;
  tail[56] = bitLength & 0xff;
  tail[57] = (bitLength >>> 8) & 0xff;
  tail[58] = (bitLength >>> 16) & 0xff;
  tail[59] = (bitLength >>> 24) & 0xff;
  for (let i = 0; i < 16; i++) block[i] = tail[i * 4] | (tail[i * 4 + 1] << 8) | (tail[i * 4 + 2] << 16) | (tail[i * 4 + 3] << 24);
  md5cycle(state, block);

  const out = new Uint8Array(16);
  for (let i = 0; i < 4; i++) {
    out[i * 4] = state[i] & 0xff;
    out[i * 4 + 1] = (state[i] >>> 8) & 0xff;
    out[i * 4 + 2] = (state[i] >>> 16) & 0xff;
    out[i * 4 + 3] = (state[i] >>> 24) & 0xff;
  }
  return Array.from(out, value => value.toString(16).padStart(2, '0')).join('');
}

async function deflateBytes(bytes) {
  if (typeof CompressionStream === 'undefined') {
    throw new Error('当前浏览器不支持 XMP 压缩，请使用 Chrome 或 Edge');
  }
  const stream = new CompressionStream('deflate');
  const writer = stream.writable.getWriter();
  writer.write(bytes);
  writer.close();
  return new Uint8Array(await new Response(stream.readable).arrayBuffer());
}

function isZlibStream(bytes) {
  if (bytes.length < 2) return false;
  const cmf = bytes[0];
  const flg = bytes[1];
  return (cmf & 0x0f) === 8 && ((cmf << 8) + flg) % 31 === 0;
}

function adler32(bytes) {
  let a = 1;
  let b = 0;
  for (let i = 0; i < bytes.length; i++) {
    a = (a + bytes[i]) % 65521;
    b = (b + a) % 65521;
  }
  return (b << 16) | a;
}

function ensureZlibStream(deflated, original) {
  if (isZlibStream(deflated)) return deflated;
  const checksum = adler32(original);
  const out = new Uint8Array(deflated.length + 6);
  out[0] = 0x78;
  out[1] = 0x9c;
  out.set(deflated, 2);
  out[out.length - 4] = (checksum >>> 24) & 0xff;
  out[out.length - 3] = (checksum >>> 16) & 0xff;
  out[out.length - 2] = (checksum >>> 8) & 0xff;
  out[out.length - 1] = checksum & 0xff;
  return out;
}

function escapeXml(value) {
  return String(value)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&apos;');
}

function utf8Bytes(value) {
  return new TextEncoder().encode(value);
}

function buildXmpXml({ title, group, uuid, md5Hash, encodedTable, options }) {
  const safeName = escapeXml(title);
  const safeGroup = group ? `>${escapeXml(group)}</rdf:li>` : '/>';
  const amountAttribute = options.amount !== 100 ? `\n   crs:RGBTableAmount="${options.amount / 100}"` : '';
  const makerAttribute = options.cameraMake ? `   crs:CameraMakeRestriction="${escapeXml(options.cameraMake)}"\n` : '';
  const modelAttribute = options.cameraModel ? `   crs:CameraModelRestriction="${escapeXml(options.cameraModel)}"\n` : '   crs:CameraModelRestriction=""\n';
  const profileAttribute = options.cameraProfile ? `   crs:CameraProfile="${escapeXml(options.cameraProfile)}"\n` : '';
  const toneMapAttribute = options.toneMapStrength === 'medium'
    ? '   crs:ToneMapStrength="1"\n'
    : options.toneMapStrength === 'high'
      ? '   crs:ToneMapStrength="2"\n'
      : '';

  return `<x:xmpmeta xmlns:x="adobe:ns:meta/" x:xmptk="Adobe XMP Core 7.0-c000 1.000000, 0000/00/00-00:00:00        ">
 <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#">
  <rdf:Description rdf:about=""
    xmlns:crs="http://ns.adobe.com/camera-raw-settings/1.0/"
   crs:PresetType="Look"
   crs:Cluster=""
   crs:UUID="${uuid}"
   crs:SupportsAmount="True"
   crs:SupportsColor="True"
   crs:SupportsMonochrome="True"
   crs:SupportsHighDynamicRange="True"
   crs:SupportsNormalDynamicRange="True"
   crs:SupportsSceneReferred="True"
   crs:SupportsOutputReferred="True"
   crs:RequiresRGBTables="False"
${makerAttribute}${modelAttribute}${profileAttribute}   crs:CameraProfileDigest=""
   crs:Copyright=""
   crs:ContactInfo=""
   crs:Version="14.3"
   crs:ProcessVersion="11.0"
${toneMapAttribute}   crs:ConvertToGrayscale="False"
   crs:RGBTable="${md5Hash}"${amountAttribute}
   crs:Table_${md5Hash}="${encodedTable}"
   crs:HasSettings="True">
   <crs:Name>
    <rdf:Alt>
     <rdf:li xml:lang="x-default">${safeName}</rdf:li>
    </rdf:Alt>
   </crs:Name>
   <crs:ShortName>
    <rdf:Alt>
     <rdf:li xml:lang="x-default"/>
    </rdf:Alt>
   </crs:ShortName>
   <crs:SortName>
    <rdf:Alt>
     <rdf:li xml:lang="x-default"/>
    </rdf:Alt>
   </crs:SortName>
   <crs:Group>
    <rdf:Alt>
     <rdf:li xml:lang="x-default"${safeGroup}
    </rdf:Alt>
   </crs:Group>
   <crs:Description>
    <rdf:Alt>
     <rdf:li xml:lang="x-default"/>
    </rdf:Alt>
   </crs:Description>
  </rdf:Description>
 </rdf:RDF>
</x:xmpmeta>
`;
}

async function buildXmpLook(sourceLut, sourceFilename) {
  const lut = cubeToXmpOrder(sourceLut);
  const targetSize = Math.min(lut.size, XMP_CONFIG.targetSize);
  const options = { ...XMP_CONFIG, targetSize, ...getXmpCameraOptions() };
  const title = sourceFilename.replace(/\.cube$/i, '');
  const lutData = resampleForXmp(lut, targetSize);
  const payload = buildXmpPayload(lutData, targetSize, options);
  const md5Hash = md5(payload);
  const uuid = md5(utf8Bytes(`${md5Hash}${Date.now()}${sourceFilename}`));
  const compressed = ensureZlibStream(await deflateBytes(payload), payload);
  const packed = new Uint8Array(4 + compressed.length);
  new DataView(packed.buffer).setUint32(0, payload.length, true);
  packed.set(compressed, 4);
  const encodedTable = encodeBase85(packed);
  return {
    text: buildXmpXml({ title, group: options.group, uuid, md5Hash, encodedTable, options }),
    size: targetSize,
    title
  };
}

/* ============ APP ============ */
const $ = (id) => document.getElementById(id);
const heroTitle = $('heroTitle');
const heroSub = $('heroSub');
const pickBtn = $('pickBtn');
const fileInput = $('fileInput');
const convertButton = $('convertButton');
const statusArea = $('statusArea');
const summary = $('summary');
const toast = $('toast');
const iosNote = $('iosNote');
const footerStats = $('footerStats');
const VERSION = 'v1.3';
const ladyMetaToggle = $('ladyMetaToggle');
const cubeMetaOption = $('cubeMetaOption');
const copyrightToggle = $('copyrightToggle');
const copyrightOption = $('copyrightOption');
const timestampToggle = $('timestampToggle');
const cubeOutputToggle = $('cubeOutputToggle');
const xmpOutputToggle = $('xmpOutputToggle');
const xmpProfilePanel = $('xmpProfilePanel');
const xmpMakerSelect = $('xmpMakerSelect');
const xmpModelSelect = $('xmpModelSelect');
const xmpCustomModelField = $('xmpCustomModelField');
const xmpCustomModelInput = $('xmpCustomModelInput');
const xmpProfileSelect = $('xmpProfileSelect');
const xmpCustomProfileField = $('xmpCustomProfileField');
const xmpCustomProfileInput = $('xmpCustomProfileInput');

function getOutputModes() {
  const modes = [];
  if (cubeOutputToggle.checked) modes.push('cube33');
  if (xmpOutputToggle.checked) modes.push('xmp');
  return modes;
}

function getModeLabel() {
  const modes = getOutputModes();
  if (modes.length === 2) return '33³ CUBE + Adobe XMP';
  if (modes[0] === 'xmp') return 'Adobe XMP';
  if (modes[0] === 'cube33') return '33³ CUBE';
  return '未选择输出';
}

function syncModeCopy() {
  const modes = getOutputModes();
  if (modes.length === 2) {
    heroTitle.innerHTML = '→ <em>33³ + XMP</em>';
    heroSub.textContent = '选文件，勾选输出格式，点击转换后再点 ↓ 保存。';
    footerStats.textContent = `${VERSION} · ready · CUBE + XMP`;
    cubeMetaOption.classList.remove('is-hidden');
    copyrightOption.classList.remove('is-hidden');
    xmpProfilePanel.classList.remove('is-hidden');
  } else if (modes[0] === 'xmp') {
    heroTitle.innerHTML = '→ <em>XMP</em>';
    heroSub.textContent = '选文件，点击转换成 Adobe/Lightroom 可用的 XMP Look。';
    footerStats.textContent = `${VERSION} · ready · Adobe XMP`;
    cubeMetaOption.classList.add('is-hidden');
    copyrightOption.classList.add('is-hidden');
    xmpProfilePanel.classList.remove('is-hidden');
  } else if (modes[0] === 'cube33') {
    heroTitle.innerHTML = '→ <em>33³</em>';
    heroSub.textContent = '选文件，点击转换到 33×33×33。';
    footerStats.textContent = `${VERSION} · ready · 33³ CUBE`;
    cubeMetaOption.classList.remove('is-hidden');
    copyrightOption.classList.remove('is-hidden');
    xmpProfilePanel.classList.add('is-hidden');
  } else {
    heroTitle.innerHTML = '→ <em>选择输出</em>';
    heroSub.textContent = '至少勾选一种输出格式后再转换。';
    footerStats.textContent = `${VERSION} · ready`;
    cubeMetaOption.classList.add('is-hidden');
    copyrightOption.classList.add('is-hidden');
    xmpProfilePanel.classList.add('is-hidden');
  }
  convertButton.disabled = !selectedFiles.length || modes.length === 0;
  convertButton.textContent = modes.length === 2
    ? '转换 CUBE + XMP'
    : modes[0] === 'xmp'
      ? '转换 XMP'
      : modes[0] === 'cube33'
        ? '转换 CUBE'
        : '选择输出格式';
  updateReadyRows();
}

function populateCameraMakers() {
  xmpMakerSelect.innerHTML = '<option value="">不写入厂商</option>' +
    CAMERA_LIBRARY.map(item => `<option value="${escapeXml(item.make)}">${escapeXml(item.make)}</option>`).join('');
}

function populateCameraModels(make, selectedModel = '') {
  const models = make ? CAMERA_LIBRARY.find(item => item.make === make)?.models || [] : [];
  xmpModelSelect.innerHTML = '<option value="">不写入机型</option>' +
    models.map(model => `<option value="${escapeXml(model)}">${escapeXml(model)}</option>`).join('') +
    '<option value="custom">自定义...</option>';
  xmpModelSelect.value = models.includes(selectedModel) ? selectedModel : selectedModel ? 'custom' : '';
}

function getXmpCameraOptions() {
  const cameraMake = xmpMakerSelect.value;
  const cameraModel = xmpModelSelect.value === 'custom' ? xmpCustomModelInput.value.trim() : xmpModelSelect.value;
  const cameraProfile = xmpProfileSelect.value === 'custom'
    ? xmpCustomProfileInput.value.trim()
    : xmpProfileSelect.value;
  return {
    cameraMake,
    cameraModel,
    cameraProfile
  };
}

function saveXmpCameraOptions() {
  try {
    localStorage.setItem('xmpCameraOptions', JSON.stringify({
      make: xmpMakerSelect.value,
      model: xmpModelSelect.value,
      customModel: xmpCustomModelInput.value,
      profile: xmpProfileSelect.value,
      customProfile: xmpCustomProfileInput.value
    }));
  } catch (e) {}
}

function syncProfileCustomField() {
  xmpCustomProfileField.classList.toggle('is-hidden', xmpProfileSelect.value !== 'custom');
}

function syncModelCustomField() {
  xmpCustomModelField.classList.toggle('is-hidden', xmpModelSelect.value !== 'custom');
}

// Restore toggle state from localStorage (persists across visits)
populateCameraMakers();
try {
  ladyMetaToggle.checked = localStorage.getItem('ladyMeta') === '1';
  copyrightToggle.checked = localStorage.getItem('pladyCopyright') === '1';
  timestampToggle.checked = localStorage.getItem('timestampSuffix') === '1';
  const savedOutputs = JSON.parse(localStorage.getItem('outputModes') || 'null');
  if (savedOutputs && typeof savedOutputs === 'object') {
    cubeOutputToggle.checked = savedOutputs.cube33 !== false;
    xmpOutputToggle.checked = savedOutputs.xmp === true;
  }
  const savedCameraOptions = JSON.parse(localStorage.getItem('xmpCameraOptions') || 'null');
  if (savedCameraOptions && typeof savedCameraOptions === 'object') {
    if (savedCameraOptions.make && CAMERA_LIBRARY.some(item => item.make === savedCameraOptions.make)) {
      xmpMakerSelect.value = savedCameraOptions.make;
    }
    populateCameraModels(xmpMakerSelect.value, savedCameraOptions.model || '');
    if (typeof savedCameraOptions.customModel === 'string') {
      xmpCustomModelInput.value = savedCameraOptions.customModel;
    }
    if (savedCameraOptions.profile) xmpProfileSelect.value = savedCameraOptions.profile;
    if (typeof savedCameraOptions.customProfile === 'string') {
      xmpCustomProfileInput.value = savedCameraOptions.customProfile;
    }
  } else {
    populateCameraModels('');
  }
} catch (e) { /* private mode etc. */ }
populateCameraModels(xmpMakerSelect.value, xmpModelSelect.value);
syncProfileCustomField();
syncModelCustomField();
ladyMetaToggle.addEventListener('change', () => {
  try { localStorage.setItem('ladyMeta', ladyMetaToggle.checked ? '1' : '0'); } catch (e) {}
});
copyrightToggle.addEventListener('change', () => {
  try { localStorage.setItem('pladyCopyright', copyrightToggle.checked ? '1' : '0'); } catch (e) {}
});
timestampToggle.addEventListener('change', () => {
  try { localStorage.setItem('timestampSuffix', timestampToggle.checked ? '1' : '0'); } catch (e) {}
});
xmpMakerSelect.addEventListener('change', () => {
  populateCameraModels(xmpMakerSelect.value);
  syncModelCustomField();
  saveXmpCameraOptions();
});
xmpModelSelect.addEventListener('change', () => {
  syncModelCustomField();
  saveXmpCameraOptions();
});
xmpCustomModelInput.addEventListener('input', saveXmpCameraOptions);
xmpProfileSelect.addEventListener('change', () => {
  syncProfileCustomField();
  saveXmpCameraOptions();
});
xmpCustomProfileInput.addEventListener('input', saveXmpCameraOptions);
function saveOutputModes() {
  try {
    localStorage.setItem('outputModes', JSON.stringify({
      cube33: cubeOutputToggle.checked,
      xmp: xmpOutputToggle.checked
    }));
  } catch (e) {}
}
[cubeOutputToggle, xmpOutputToggle].forEach(input => {
  input.addEventListener('change', () => {
    saveOutputModes();
    syncModeCopy();
  });
});

const isiOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
  (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

let selectedFiles = [];
let totalProcessed = 0;
let pipelineId = 0;

syncModeCopy();

function showToast(msg, type = '', ms = 2400) {
  toast.textContent = msg;
  toast.className = 'toast show ' + type;
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => toast.classList.remove('show'), ms);
}

if (isiOS) iosNote.classList.add('show');

pickBtn.addEventListener('click', () => fileInput.click());

['dragenter', 'dragover'].forEach(evt => {
  pickBtn.addEventListener(evt, (e) => { e.preventDefault(); pickBtn.classList.add('drag'); });
});
['dragleave', 'drop'].forEach(evt => {
  pickBtn.addEventListener(evt, (e) => { e.preventDefault(); pickBtn.classList.remove('drag'); });
});
pickBtn.addEventListener('drop', (e) => {
  const files = Array.from(e.dataTransfer.files);
  if (files.length) setSelectedFiles(files);
});

fileInput.addEventListener('change', (e) => {
  const files = Array.from(e.target.files || []);
  fileInput.value = '';
  if (files.length) setSelectedFiles(files);
});

convertButton.addEventListener('click', () => {
  if (selectedFiles.length) startPipeline(selectedFiles);
});

function setSelectedFiles(files) {
  const cubeFiles = files.filter(f => f.name.toLowerCase().endsWith('.cube'));
  const skipped = files.length - cubeFiles.length;

  if (skipped) showToast(`已跳过 ${skipped} 个非 .cube 文件`, 'error');
  selectedFiles = cubeFiles;
  summary.classList.remove('show');
  statusArea.innerHTML = '';

  if (!cubeFiles.length) {
    convertButton.disabled = true;
    return;
  }

  for (const file of cubeFiles) {
    const row = document.createElement('div');
    row.className = 'progress-row pending';
    row.innerHTML = `
      <div class="pname">
        <strong>${file.name}</strong>
        <div class="pmeta">ready · ${getModeLabel()}</div>
      </div>
      <div class="pstatus">ready</div>
    `;
    statusArea.appendChild(row);
  }

  syncModeCopy();
  showToast(`已选择 ${cubeFiles.length} 个 .cube`, 'success');
}

function updateReadyRows() {
  const rows = statusArea.querySelectorAll('.progress-row.pending');
  for (const row of rows) {
    const meta = row.querySelector('.pmeta');
    const badge = row.querySelector('.pstatus');
    if (meta) meta.textContent = `待转换 · ${getModeLabel()}`;
    if (badge) badge.textContent = '待转换';
  }
}

async function startPipeline(files) {
  const myRun = ++pipelineId;
  const cubeFiles = files.filter(f => f.name.toLowerCase().endsWith('.cube'));
  const outputModes = getOutputModes();
  const modeLabel = getModeLabel();

  if (!outputModes.length) {
    showToast('请至少勾选一种输出格式', 'error');
    syncModeCopy();
    return;
  }
  if (!cubeFiles.length) return;

  convertButton.disabled = true;
  statusArea.innerHTML = '';
  summary.classList.remove('show');

  const jobs = cubeFiles.flatMap((file) => outputModes.map((mode) => ({ file, mode })));
  const rows = jobs.map(({ file, mode }) => {
    const row = document.createElement('div');
    row.className = 'progress-row pending';
    row.innerHTML = `
      <div class="pname">
        <strong>${file.name}</strong>
        <div class="pmeta">queued · ${mode === 'xmp' ? 'Adobe XMP' : '33³ CUBE'}</div>
      </div>
      <div class="pstatus">queue</div>
    `;
    statusArea.appendChild(row);
    return { file, mode, row };
  });

  let done = 0, errors = 0;
  const results = [];

  for (const { file, mode, row } of rows) {
    if (myRun !== pipelineId) return;

    row.className = 'progress-row processing';
    row.querySelector('.pstatus').textContent = 'process';
    const meta = row.querySelector('.pmeta');
    meta.textContent = 'parsing & resampling…';
    await new Promise(r => setTimeout(r, 16));

    let resultText, resultName, sourceSize, outputSize;
    try {
      const text = await file.text();
      const sourceLut = parseCube(text);
      sourceSize = sourceLut.size;
      const base = file.name.replace(/\.cube$/i, '');
      const suffix = timestampToggle.checked ? makeSuffix() : '';
      if (mode === 'xmp') {
        meta.textContent = 'building Adobe XMP look…';
        const xmp = await buildXmpLook(sourceLut, file.name);
        resultText = xmp.text;
        outputSize = xmp.size;
        resultName = `${base}${suffix}.xmp`;
      } else {
        const resampled = resampleLUT(sourceLut, CONFIG.targetSize);
        resultText = serializeCube(
          resampled,
          file.name,
          CONFIG.precision,
          CONFIG.clamp,
          ladyMetaToggle.checked,
          copyrightToggle.checked
        );
        outputSize = CONFIG.targetSize;
        resultName = `${base}${suffix}.cube`;
      }
    } catch (e) {
      console.error(e);
      row.className = 'progress-row error';
      row.querySelector('.pstatus').textContent = 'fail';
      meta.className = 'pmeta err';
      meta.textContent = e.message;
      errors++;
      continue;
    }

    const blob = new Blob([resultText], { type: 'application/octet-stream' });
    prepareDownloadLink(blob, resultName, row);

    row.className = 'progress-row done';
    row.querySelector('.pstatus').textContent = 'done';
    row.querySelector('.pname strong').textContent = resultName;
    meta.className = 'pmeta';
    meta.textContent = mode === 'xmp'
      ? `${file.name} · ${sourceSize}³ → XMP ${outputSize}³`
      : `${file.name} · ${sourceSize}³ → ${outputSize}³`;

    results.push({ name: resultName, blob, text: resultText, row });
    done++;
    totalProcessed++;
    footerStats.textContent = `${VERSION} · ${totalProcessed} processed · ${modeLabel}`;
  }

  convertButton.disabled = !selectedFiles.length || getOutputModes().length === 0;

  if (done > 0) {
    let msg = `${modeLabel} 转换完成 · <strong>${done}</strong> 个文件`;
    if (errors) msg += ` · ${errors} 失败`;
    msg += ` · 点 <strong>↓ 保存</strong> 下载`;
    summary.innerHTML = msg;
    summary.classList.add('show');

    if (results.length > 1) {
      offerZipDownload(results);
    }
  }

  if (errors && !done) showToast(`全部失败（${errors}）`, 'error');
  else if (done && !errors) showToast(`完成 ${done} 个`, 'success');
  else if (done) showToast(`${done} 完成 · ${errors} 失败`, 'error');
}

// Prepare a manual download link in the row. Does NOT auto-trigger; the user
// taps the "保存" button when ready (per request).
function prepareDownloadLink(blob, filename, row) {
  const url = URL.createObjectURL(blob);

  if (row) {
    const existing = row.querySelector('.dl-link');
    if (existing) existing.remove();
    const link = document.createElement('a');
    link.className = 'dl-link';
    link.href = url;
    link.download = filename;
    link.textContent = '↓ 保存';
    const statusBadge = row.querySelector('.pstatus');
    row.insertBefore(link, statusBadge);
  }

  setTimeout(() => URL.revokeObjectURL(url), 10 * 60 * 1000);
}

async function offerZipDownload(results) {
  const zip = new JSZip();
  for (const r of results) zip.file(r.name, r.text);
  const blob = await zip.generateAsync({
    type: 'blob',
    compression: 'DEFLATE',
    compressionOptions: { level: 6 }
  });
  const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
  const modes = getOutputModes();
  const prefix = modes.length === 2 ? 'lut-33-xmp' : modes[0] === 'xmp' ? 'lut-xmp' : 'lut-33';
  const filename = `${prefix}-${ts}.zip`;
  const url = URL.createObjectURL(blob);

  const zipRow = document.createElement('div');
  zipRow.className = 'progress-row done';
  zipRow.style.borderLeftColor = 'var(--accent)';
  zipRow.style.background = 'rgba(212, 255, 58, 0.06)';
  zipRow.innerHTML = `
    <div class="pname">
      <strong>一次下载所有</strong>
      <div class="pmeta">${results.length} 个文件 · ${(blob.size/1024).toFixed(1)} KB · ZIP</div>
    </div>
    <a class="dl-link" href="${url}" download="${filename}">↓ ZIP</a>
  `;
  statusArea.insertBefore(zipRow, statusArea.firstChild);

  setTimeout(() => URL.revokeObjectURL(url), 10 * 60 * 1000);
}
