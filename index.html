<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LUT 33³">
<meta name="theme-color" content="#0a0a0b">
<title>CUBE → 33³</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root {
    --bg: #0a0a0b;
    --bg-elev: #131316;
    --bg-card: #18181c;
    --line: #26262c;
    --line-bright: #3a3a44;
    --text: #e8e8ea;
    --text-dim: #8a8a93;
    --text-faint: #5a5a63;
    --accent: #d4ff3a;
    --accent-dim: #8fa823;
    --danger: #ff5a5a;
    --warn: #ffaa3a;
    --ok: #6affb0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 13px;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -webkit-text-size-adjust: 100%;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    background-image:
      radial-gradient(circle at 20% 15%, rgba(212, 255, 58, 0.05) 0%, transparent 45%),
      radial-gradient(circle at 80% 85%, rgba(106, 255, 176, 0.03) 0%, transparent 45%);
    background-attachment: fixed;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 60px 60px;
    opacity: 0.1;
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    flex: 1;
    width: 100%;
    max-width: 540px;
    margin: 0 auto;
    padding: 32px 20px 40px;
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
  }

  header {
    text-align: center;
    margin-bottom: 36px;
  }

  .eyebrow {
    color: var(--text-faint);
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .eyebrow .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    50% { box-shadow: 0 0 18px var(--accent); }
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: clamp(40px, 11vw, 56px);
    line-height: 0.95;
    letter-spacing: -0.025em;
    margin-bottom: 12px;
  }

  h1 em {
    font-style: italic;
    font-weight: 500;
    color: var(--accent);
  }

  header .sub {
    color: var(--text-dim);
    font-size: 12px;
    max-width: 320px;
    margin: 0 auto;
  }

  .pick-btn {
    display: block;
    width: 100%;
    padding: 32px 24px;
    background: var(--bg-card);
    border: 1px dashed var(--line-bright);
    border-radius: 6px;
    cursor: pointer;
    text-align: center;
    transition: all 200ms cubic-bezier(.2,.9,.3,1);
    position: relative;
    overflow: hidden;
    -webkit-appearance: none;
    appearance: none;
    color: var(--text);
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }

  .pick-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(212, 255, 58, 0.08) 0%, transparent 65%);
    opacity: 0;
    transition: opacity 240ms;
    pointer-events: none;
  }

  .pick-btn:hover, .pick-btn:focus-visible {
    border-color: var(--accent);
    background: rgba(212, 255, 58, 0.03);
  }
  .pick-btn:hover::before, .pick-btn:focus-visible::before { opacity: 1; }
  .pick-btn:active {
    transform: scale(0.99);
  }
  .pick-btn:focus-visible { outline: none; }

  .pick-btn.drag {
    border-style: solid;
    border-color: var(--accent);
    background: rgba(212, 255, 58, 0.05);
  }

  .pick-btn-icon {
    font-family: 'Fraunces', serif;
    font-size: 60px;
    line-height: 1;
    color: var(--accent);
    margin-bottom: 18px;
    font-weight: 300;
    font-style: italic;
    display: block;
  }

  .pick-btn-main {
    font-size: 16px;
    color: var(--text);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .pick-btn-sub {
    color: var(--text-faint);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .dest {
    margin-top: 18px;
    padding: 14px 16px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 11px;
  }
  .dest-icon {
    color: var(--accent);
    font-family: 'Fraunces', serif;
    font-size: 16px;
    line-height: 1;
    width: 16px;
    text-align: center;
    font-style: italic;
  }
  .dest-label {
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-size: 10px;
  }
  .dest-value {
    color: var(--text);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .dest-change {
    color: var(--accent);
    background: none;
    border: none;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 4px 8px;
    margin: -4px -8px;
    -webkit-tap-highlight-color: transparent;
  }
  .dest-change:hover { text-decoration: underline; text-underline-offset: 3px; }

  /* TOGGLE ROW (same chassis as .dest) */
  .toggle-row {
    margin-top: 8px;
    padding: 14px 16px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 11px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: border-color 150ms;
  }
  .toggle-row:hover { border-color: var(--line-bright); }

  .toggle-row .dest-icon {
    /* reuse */
  }

  .toggle-row .tlabel {
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-size: 10px;
  }
  .toggle-row .tvalue {
    color: var(--text);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* the actual switch */
  .switch {
    position: relative;
    width: 38px;
    height: 22px;
    flex-shrink: 0;
  }
  .switch input {
    position: absolute;
    width: 100%; height: 100%;
    opacity: 0;
    cursor: pointer;
    z-index: 2;
    margin: 0;
  }
  .switch .track {
    position: absolute;
    inset: 0;
    background: var(--line-bright);
    border-radius: 11px;
    transition: background 200ms;
  }
  .switch .knob {
    position: absolute;
    top: 3px; left: 3px;
    width: 16px; height: 16px;
    background: var(--text-dim);
    border-radius: 50%;
    transition: transform 200ms cubic-bezier(.2,.9,.3,1), background 200ms;
  }
  .switch input:checked ~ .track {
    background: var(--accent-dim);
  }
  .switch input:checked ~ .knob {
    transform: translateX(16px);
    background: var(--accent);
  }

  .status-area {
    margin-top: 28px;
    min-height: 0;
  }

  .progress-row {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-left: 2px solid var(--line-bright);
    padding: 14px 16px;
    margin-bottom: 8px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    transition: border-left-color 200ms, background 200ms;
  }
  .progress-row.processing {
    border-left-color: var(--warn);
    background: rgba(255, 170, 58, 0.04);
  }
  .progress-row.done {
    border-left-color: var(--ok);
  }
  .progress-row.error {
    border-left-color: var(--danger);
    background: rgba(255, 90, 90, 0.04);
  }

  .progress-row .pname {
    flex: 1;
    overflow: hidden;
    min-width: 0;
  }
  .progress-row .pname strong {
    color: var(--text);
    font-weight: 500;
    display: block;
    margin-bottom: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .progress-row .pname .pmeta {
    color: var(--text-faint);
    font-size: 10px;
    letter-spacing: 0.05em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .progress-row .pname .pmeta.err {
    color: var(--danger);
  }

  .progress-row .pstatus {
    font-size: 9px;
    padding: 4px 8px;
    border: 1px solid;
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .progress-row.pending .pstatus { color: var(--text-faint); border-color: var(--line-bright); }
  .progress-row.processing .pstatus {
    color: var(--warn); border-color: var(--warn);
    animation: pulse 1.4s ease-in-out infinite;
  }
  .progress-row.done .pstatus { color: var(--ok); border-color: var(--ok); }
  .progress-row.error .pstatus { color: var(--danger); border-color: var(--danger); }

  @keyframes pulse { 50% { opacity: 0.4; } }

  .progress-row .dl-link {
    background: var(--accent);
    color: var(--bg);
    border: 1px solid var(--accent);
    padding: 8px 14px;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 3px;
    font-weight: 600;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .progress-row .dl-link:active { transform: scale(0.96); }

  .summary {
    margin-top: 18px;
    padding: 14px 16px;
    border: 1px solid var(--accent-dim);
    background: rgba(212, 255, 58, 0.06);
    border-radius: 4px;
    color: var(--text);
    font-size: 12px;
    display: none;
    text-align: center;
  }
  .summary.show { display: block; }
  .summary strong { color: var(--accent); }

  .ios-note {
    margin-top: 14px;
    padding: 12px 14px;
    border: 1px solid var(--line);
    background: var(--bg-card);
    border-radius: 4px;
    font-size: 10px;
    line-height: 1.6;
    color: var(--text-dim);
    display: none;
  }
  .ios-note.show { display: block; }
  .ios-note .lbl {
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-size: 9px;
    display: block;
    margin-bottom: 4px;
  }

  footer {
    margin-top: auto;
    padding-top: 32px;
    text-align: center;
    color: var(--text-faint);
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    line-height: 2;
  }

  .toast {
    position: fixed;
    bottom: max(24px, env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(120%);
    background: var(--bg-card);
    border: 1px solid var(--line-bright);
    color: var(--text);
    padding: 12px 18px;
    border-radius: 4px;
    font-size: 12px;
    transition: transform 280ms cubic-bezier(.2,.9,.3,1);
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    max-width: calc(100vw - 32px);
    text-align: center;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { border-color: var(--danger); color: var(--danger); }
  .toast.success { border-color: var(--accent); color: var(--accent); }

  @media (max-width: 380px) {
    h1 { font-size: 36px; }
    .pick-btn { padding: 28px 20px; }
    .pick-btn-icon { font-size: 50px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow"><span class="dot"></span> CUBE · LUT · RESAMPLER</div>
    <h1>→ <em>33³</em></h1>
    <p class="sub">选文件，自动转换到 33×33×33，自动下载。</p>
  </header>

  <button class="pick-btn" id="pickBtn" type="button">
    <span class="pick-btn-icon">+</span>
    <div class="pick-btn-main">选择 .cube 文件</div>
    <div class="pick-btn-sub">tap to select · multi-file ok</div>
  </button>
  <input type="file" id="fileInput" multiple style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;" />

  <div class="dest" id="destBlock" style="display:none;">
    <div class="dest-icon">↓</div>
    <div style="flex:1; min-width:0;">
      <div class="dest-label">save to</div>
      <div class="dest-value" id="destValue">downloads</div>
    </div>
    <button class="dest-change" id="destChange" type="button">change</button>
  </div>

  <label class="toggle-row" for="ladyMetaToggle">
    <div class="dest-icon">P</div>
    <div style="flex:1; min-width:0;">
      <div class="tlabel">metadata · LUMIX × Plady</div>
      <div class="tvalue">写入 STD 标记 + Plady 版权声明</div>
    </div>
    <span class="switch">
      <input type="checkbox" id="ladyMetaToggle" />
      <span class="track"></span>
      <span class="knob"></span>
    </span>
  </label>

  <div class="status-area" id="statusArea"></div>

  <div class="summary" id="summary"></div>

  <div class="ios-note" id="iosNote">
    <span class="lbl">iOS Tip</span>
    若文件在 Safari 内打开预览（而非下载），<strong style="color:var(--text)">长按下方下载按钮</strong> → 选「下载链接的文件」即可保存到「文件」App。
  </div>

  <footer>
    <div>33³ · catmull-rom cubic · clamped · local-only</div>
    <div><span id="footerCount">—</span> files processed</div>
  </footer>
</div>

<div class="toast" id="toast"></div>

<script>
/* Fixed recommended settings — no UI exposure */
const CONFIG = {
  targetSize: 33,
  precision: 6,
  suffix: '_33',
  clamp: true
};

/* ============ CUBE PARSER ============ */
function parseCube(text) {
  const lines = text.split(/\r?\n/);
  let size = null, title = '';
  let domainMin = [0, 0, 0];
  let domainMax = [1, 1, 1];
  let type = '3D';
  const data = [];

  for (let raw of lines) {
    const line = raw.trim();
    if (!line || line.startsWith('#')) continue;
    const upper = line.toUpperCase();
    if (upper.startsWith('TITLE')) { const m = line.match(/"([^"]*)"/); title = m ? m[1] : ''; continue; }
    if (upper.startsWith('LUT_3D_SIZE')) { size = parseInt(line.split(/\s+/)[1], 10); type = '3D'; continue; }
    if (upper.startsWith('LUT_1D_SIZE')) { size = parseInt(line.split(/\s+/)[1], 10); type = '1D'; continue; }
    if (upper.startsWith('DOMAIN_MIN')) { const p = line.split(/\s+/).slice(1).map(parseFloat); domainMin = [p[0],p[1],p[2]]; continue; }
    if (upper.startsWith('DOMAIN_MAX')) { const p = line.split(/\s+/).slice(1).map(parseFloat); domainMax = [p[0],p[1],p[2]]; continue; }
    const parts = line.split(/\s+/);
    if (parts.length >= 3) {
      const r = parseFloat(parts[0]);
      const g = parseFloat(parts[1]);
      const b = parseFloat(parts[2]);
      if (!isNaN(r) && !isNaN(g) && !isNaN(b)) data.push(r, g, b);
    }
  }
  if (type === '1D') throw new Error('1D LUT not supported');
  if (!size) throw new Error('LUT_3D_SIZE not found');
  if (data.length !== size * size * size * 3) {
    throw new Error(`Data count mismatch: expected ${size**3 * 3}, got ${data.length}`);
  }
  return { size, title, domainMin, domainMax, data: new Float32Array(data) };
}

/* ============ INDEXING ============ */
function getLUTSample(lut, r, g, b) {
  const s = lut.size;
  r = Math.max(0, Math.min(s-1, r));
  g = Math.max(0, Math.min(s-1, g));
  b = Math.max(0, Math.min(s-1, b));
  const idx = ((b*s + g)*s + r) * 3;
  return [lut.data[idx], lut.data[idx+1], lut.data[idx+2]];
}

/* ============ TRICUBIC (Catmull-Rom) ============ */
function catmullRom(p0, p1, p2, p3, t) {
  const t2 = t*t, t3 = t2*t;
  return 0.5 * ((2*p1) + (-p0 + p2)*t + (2*p0 - 5*p1 + 4*p2 - p3)*t2 + (-p0 + 3*p1 - 3*p2 + p3)*t3);
}
function sampleCubic(lut, fr, fg, fb) {
  const s = lut.size;
  const x = fr*(s-1), y = fg*(s-1), z = fb*(s-1);
  const ix = Math.floor(x), iy = Math.floor(y), iz = Math.floor(z);
  const tx = x-ix, ty = y-iy, tz = z-iz;
  const out = [0,0,0];
  for (let ch = 0; ch < 3; ch++) {
    const layer = new Array(4);
    for (let dz = -1; dz <= 2; dz++) {
      const zi = iz + dz;
      const row = new Array(4);
      for (let dy = -1; dy <= 2; dy++) {
        const yi = iy + dy;
        const col = new Array(4);
        for (let dx = -1; dx <= 2; dx++) col[dx+1] = getLUTSample(lut, ix+dx, yi, zi)[ch];
        row[dy+1] = catmullRom(col[0], col[1], col[2], col[3], tx);
      }
      layer[dz+1] = catmullRom(row[0], row[1], row[2], row[3], ty);
    }
    out[ch] = catmullRom(layer[0], layer[1], layer[2], layer[3], tz);
  }
  return out;
}

/* ============ RESAMPLE ============ */
function resampleLUT(lut, targetSize) {
  const out = new Float32Array(targetSize**3 * 3);
  const denom = targetSize - 1;
  for (let b = 0; b < targetSize; b++) {
    const fb = b / denom;
    for (let g = 0; g < targetSize; g++) {
      const fg = g / denom;
      for (let r = 0; r < targetSize; r++) {
        const fr = r / denom;
        const c = sampleCubic(lut, fr, fg, fb);
        const idx = ((b*targetSize + g)*targetSize + r) * 3;
        out[idx] = c[0]; out[idx+1] = c[1]; out[idx+2] = c[2];
      }
    }
  }
  return { size: targetSize, title: lut.title, domainMin: lut.domainMin, domainMax: lut.domainMax, data: out };
}

/* ============ SERIALIZE (strict) ============ */
function serializeCube(lut, sourceFilename, precision, clamp, ladyMeta) {
  const lines = [];
  let title = lut.title || sourceFilename.replace(/\.cube$/i, '');
  const cleanTitle = String(title).replace(/"/g, '');
  const dmin = lut.domainMin || [0,0,0];
  const dmax = lut.domainMax || [1,1,1];

  if (ladyMeta) {
    // Replicate the LUMIX × Plady header layout exactly
    const year = new Date().getFullYear();
    lines.push(`#Copyright: (C) Copyright ${year} Plady`);
    lines.push(`TITLE "${cleanTitle}"`);
    lines.push(`#LUMIXPHOTOSTYLE STD`);
    lines.push(`#LUT size`);
    lines.push(`LUT_3D_SIZE ${lut.size}`);
    lines.push(`#data domain`);
    // Reference uses 0.0 / 1.0 (one-decimal). Match that for default domain.
    const isDefault = dmin[0]===0 && dmin[1]===0 && dmin[2]===0 &&
                      dmax[0]===1 && dmax[1]===1 && dmax[2]===1;
    if (isDefault) {
      lines.push(`DOMAIN_MIN 0.0 0.0 0.0`);
      lines.push(`DOMAIN_MAX 1.0 1.0 1.0`);
    } else {
      lines.push(`DOMAIN_MIN ${dmin.map(v => v.toFixed(precision)).join(' ')}`);
      lines.push(`DOMAIN_MAX ${dmax.map(v => v.toFixed(precision)).join(' ')}`);
    }
    lines.push(`#LUT data points`);
  } else {
    if (cleanTitle) lines.push(`TITLE "${cleanTitle}"`);
    lines.push(`# Resampled to ${lut.size}^3 by CUBE LUT Resampler`);
    lines.push(`LUT_3D_SIZE ${lut.size}`);
    lines.push(`DOMAIN_MIN ${dmin.map(v => v.toFixed(precision)).join(' ')}`);
    lines.push(`DOMAIN_MAX ${dmax.map(v => v.toFixed(precision)).join(' ')}`);
    lines.push('');
  }

  const n = lut.size ** 3;
  const out = new Array(n);
  for (let i = 0; i < n; i++) {
    let r = lut.data[i*3], g = lut.data[i*3+1], b = lut.data[i*3+2];
    if (clamp) {
      if (r < dmin[0]) r = dmin[0]; else if (r > dmax[0]) r = dmax[0];
      if (g < dmin[1]) g = dmin[1]; else if (g > dmax[1]) g = dmax[1];
      if (b < dmin[2]) b = dmin[2]; else if (b > dmax[2]) b = dmax[2];
    }
    if (r === 0) r = 0; if (g === 0) g = 0; if (b === 0) b = 0;
    out[i] = `${r.toFixed(precision)} ${g.toFixed(precision)} ${b.toFixed(precision)}`;
  }
  // ladyMeta header has no trailing blank before data; non-ladyMeta does (already appended above)
  return lines.join('\n') + '\n' + out.join('\n') + '\n';
}

/* ============ APP ============ */
const $ = (id) => document.getElementById(id);
const pickBtn = $('pickBtn');
const fileInput = $('fileInput');
const destBlock = $('destBlock');
const destValue = $('destValue');
const destChange = $('destChange');
const statusArea = $('statusArea');
const summary = $('summary');
const toast = $('toast');
const iosNote = $('iosNote');
const footerCount = $('footerCount');
const ladyMetaToggle = $('ladyMetaToggle');

// Restore toggle state from localStorage (persists across visits)
try {
  ladyMetaToggle.checked = localStorage.getItem('ladyMeta') === '1';
} catch (e) { /* private mode etc. */ }
ladyMetaToggle.addEventListener('change', () => {
  try { localStorage.setItem('ladyMeta', ladyMetaToggle.checked ? '1' : '0'); } catch (e) {}
});

const isiOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
  (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
const supportsFSA = 'showDirectoryPicker' in window;

let outputDirHandle = null;
let totalProcessed = 0;
let pipelineId = 0;

function showToast(msg, type = '', ms = 2400) {
  toast.textContent = msg;
  toast.className = 'toast show ' + type;
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => toast.classList.remove('show'), ms);
}

function refreshDestUI() {
  destBlock.style.display = 'flex';
  if (!supportsFSA) {
    destValue.textContent = isiOS ? '「文件」App / Safari 下载' : '浏览器默认下载位置';
    destChange.style.display = 'none';
    return;
  }
  if (outputDirHandle) {
    destValue.textContent = outputDirHandle.name + '/';
    destChange.textContent = 'change';
  } else {
    destValue.textContent = '浏览器默认下载位置';
    destChange.textContent = 'choose folder';
  }
}

destChange.addEventListener('click', async () => {
  if (!supportsFSA) return;
  try {
    const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
    outputDirHandle = handle;
    refreshDestUI();
    showToast(`已选择目录：${handle.name}`, 'success');
  } catch (e) {
    if (e.name !== 'AbortError') {
      console.error(e);
      showToast('选择目录失败', 'error');
    }
  }
});

refreshDestUI();
if (isiOS) iosNote.classList.add('show');

pickBtn.addEventListener('click', () => fileInput.click());

['dragenter', 'dragover'].forEach(evt => {
  pickBtn.addEventListener(evt, (e) => { e.preventDefault(); pickBtn.classList.add('drag'); });
});
['dragleave', 'drop'].forEach(evt => {
  pickBtn.addEventListener(evt, (e) => { e.preventDefault(); pickBtn.classList.remove('drag'); });
});
pickBtn.addEventListener('drop', (e) => {
  const files = Array.from(e.dataTransfer.files);
  if (files.length) startPipeline(files);
});

fileInput.addEventListener('change', (e) => {
  const files = Array.from(e.target.files || []);
  fileInput.value = '';
  if (files.length) startPipeline(files);
});

async function startPipeline(files) {
  const myRun = ++pipelineId;
  const cubeFiles = files.filter(f => f.name.toLowerCase().endsWith('.cube'));
  const skipped = files.length - cubeFiles.length;

  if (skipped) showToast(`已跳过 ${skipped} 个非 .cube 文件`, 'error');
  if (!cubeFiles.length) return;

  statusArea.innerHTML = '';
  summary.classList.remove('show');

  const rows = cubeFiles.map((f) => {
    const row = document.createElement('div');
    row.className = 'progress-row pending';
    row.innerHTML = `
      <div class="pname">
        <strong>${f.name}</strong>
        <div class="pmeta">queued</div>
      </div>
      <div class="pstatus">queue</div>
    `;
    statusArea.appendChild(row);
    return { file: f, row };
  });

  let done = 0, errors = 0;
  const results = [];

  for (const { file, row } of rows) {
    if (myRun !== pipelineId) return;

    row.className = 'progress-row processing';
    row.querySelector('.pstatus').textContent = 'process';
    const meta = row.querySelector('.pmeta');
    meta.textContent = 'parsing & resampling…';
    await new Promise(r => setTimeout(r, 16));

    let resultText, resultName, sourceSize;
    try {
      const text = await file.text();
      const sourceLut = parseCube(text);
      sourceSize = sourceLut.size;
      const resampled = resampleLUT(sourceLut, CONFIG.targetSize);
      resultText = serializeCube(resampled, file.name, CONFIG.precision, CONFIG.clamp, ladyMetaToggle.checked);
      const base = file.name.replace(/\.cube$/i, '');
      resultName = `${base}${CONFIG.suffix}.cube`;
    } catch (e) {
      console.error(e);
      row.className = 'progress-row error';
      row.querySelector('.pstatus').textContent = 'fail';
      meta.className = 'pmeta err';
      meta.textContent = e.message;
      errors++;
      continue;
    }

    const blob = new Blob([resultText], { type: 'application/octet-stream' });
    let savedTo = null;

    if (outputDirHandle) {
      try {
        const fileHandle = await outputDirHandle.getFileHandle(resultName, { create: true });
        const writable = await fileHandle.createWritable();
        await writable.write(blob);
        await writable.close();
        savedTo = `${outputDirHandle.name}/${resultName}`;
      } catch (e) {
        console.error('FSA write failed', e);
      }
    }

    if (!savedTo) {
      triggerAnchorDownload(blob, resultName, row);
      savedTo = resultName;
    }

    row.className = 'progress-row done';
    row.querySelector('.pstatus').textContent = 'done';
    meta.className = 'pmeta';
    meta.textContent = `${sourceSize}³ → ${CONFIG.targetSize}³ · ${resultName}`;

    results.push({ name: resultName, blob, text: resultText, row });
    done++;
    totalProcessed++;
    footerCount.textContent = totalProcessed;
  }

  if (done > 0) {
    let msg = `转换完成 · <strong>${done}</strong> 个`;
    if (errors) msg += ` · ${errors} 失败`;
    if (outputDirHandle) {
      msg += ` · 已保存到 <strong>${outputDirHandle.name}/</strong>`;
    } else {
      msg += isiOS ? ` · 点下方按钮保存` : ` · 已发起下载`;
    }
    summary.innerHTML = msg;
    summary.classList.add('show');

    if (!outputDirHandle && results.length > 1) {
      offerZipDownload(results);
    }
  }

  if (errors && !done) showToast(`全部失败（${errors}）`, 'error');
  else if (done && !errors) showToast(`完成 ${done} 个`, 'success');
  else if (done) showToast(`${done} 完成 · ${errors} 失败`, 'error');
}

function triggerAnchorDownload(blob, filename, row) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.style.display = 'none';
  document.body.appendChild(a);
  try { a.click(); } catch (e) {}
  document.body.removeChild(a);

  if (row) {
    const existing = row.querySelector('.dl-link');
    if (existing) existing.remove();
    const link = document.createElement('a');
    link.className = 'dl-link';
    link.href = url;
    link.download = filename;
    link.textContent = '↓ 保存';
    const statusBadge = row.querySelector('.pstatus');
    row.insertBefore(link, statusBadge);
  }

  setTimeout(() => URL.revokeObjectURL(url), 10 * 60 * 1000);
}

async function offerZipDownload(results) {
  const zip = new JSZip();
  for (const r of results) zip.file(r.name, r.text);
  const blob = await zip.generateAsync({
    type: 'blob',
    compression: 'DEFLATE',
    compressionOptions: { level: 6 }
  });
  const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
  const filename = `lut-33-${ts}.zip`;
  const url = URL.createObjectURL(blob);

  const zipRow = document.createElement('div');
  zipRow.className = 'progress-row done';
  zipRow.style.borderLeftColor = 'var(--accent)';
  zipRow.style.background = 'rgba(212, 255, 58, 0.06)';
  zipRow.innerHTML = `
    <div class="pname">
      <strong>📦 一次下载所有</strong>
      <div class="pmeta">${results.length} 个文件 · ${(blob.size/1024).toFixed(1)} KB · ZIP</div>
    </div>
    <a class="dl-link" href="${url}" download="${filename}">↓ ZIP</a>
  `;
  statusArea.insertBefore(zipRow, statusArea.firstChild);

  const autoA = document.createElement('a');
  autoA.href = url;
  autoA.download = filename;
  autoA.style.display = 'none';
  document.body.appendChild(autoA);
  try { autoA.click(); } catch {}
  document.body.removeChild(autoA);

  setTimeout(() => URL.revokeObjectURL(url), 10 * 60 * 1000);
}
</script>
</body>
</html>
